# - LLM on host: set LLM_*_URL to http://host.docker.internal:PORT/v1 and listen on 0.0.0.0
#   (not only 127.0.0.1) so the container can reach the host. If connection refused, fix URL/port/firewall.
# - Requirement mockup uploads: shown when LLM_VISION_URL is set (GET /api/config llm_vision_configured).
# - Auto test / Playwright: use an image built with the project Dockerfile (Playwright+browsers) and rebuild
#   after Dockerfile changes. Plain python-slim without `playwright install` will fail to launch the browser.
services:
  test-intellect-ai:
    image: test-intellect-ai:1.0
    build: .
    ports:
      - "8001:8000"
    environment:
      SHOW_MEMORY_UI: "true"
      SHOW_AUDIT_UI: "true"
      SHOW_JIRA_MODE_UI: "true"
      SHOW_PASTE_REQUIREMENTS_MODE_UI: "true"
      SHOW_AUTO_TESTS_UI: "true"

      JIRA_URL: ""
      JIRA_USERNAME: ""
      JIRA_PASSWORD: ""
      JIRA_TEST_PROJECT_KEY: ""
      JIRA_TEST_ISSUE_TYPE: Test
      JIRA_TEST_LINK_TYPE: Relates
      JIRA_LINK_INWARD_IS_REQUIREMENT: "true"
      JIRA_VERIFY_SSL: "false"
      JIRA_LINKED_WORK_ISSUE_TYPES: "Story,Improvement,Feature"

      MOCK: "false"

      AUTOMATION_POST_ANALYSIS: "true"
      AUTOMATION_WRITE_RUN_HTML: "true"
      AUTOMATION_RETENTION_DAYS: "20"
      AUTOMATION_SPIKE_PRERUN: "false"
      AUTOMATION_HEADLESS: "true"

      USE_KEYCLOAK: "false"
      KEYCLOAK_URL: ""
      KEYCLOAK_REALM: ""
      KEYCLOAK_CLIENT_ID: ""
      KEYCLOAK_CLIENT_SECRET: ""
      KEYCLOAK_IDLE_TIMEOUT_MINUTES: "60"
      KEYCLOAK_INTERNAL_URL: "http://host.docker.internal:8080"

      LLM_TEXT_URL: "http://host.docker.internal:1234/v1"
      LLM_TEXT_MODEL: "qwen/qwen3-coder-next"
      LLM_TEXT_ACCESS_TOKEN: ""
      DOCKER_LLM_URL: ""

      LLM_VISION_URL: "http://host.docker.internal:1234/v1"
      LLM_VISION_MODEL: "qwen/qwen3-vl-30b"
      LLM_VISION_ACCESS_TOKEN: ""

      LLM_REQUIREMENT_IMAGES_MAX_COUNT: "5"
      LLM_REQUIREMENT_IMAGES_MAX_TOTAL_MB: "300"

      MEMORY_SIMILARITY_THRESHOLD: "0.92"
      PASTE_MODE_PRIORITIES: "Highest, High, Medium, Low, Lowest"

    volumes:
      - ./data:/app/data
    extra_hosts:
      - "host.docker.internal:host-gateway"
