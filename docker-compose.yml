services:
  test-intellect-ai:
    platform: linux/amd64
    image: test-intellect-ai:latest
    build:
      context: .
      platforms:
        - linux/amd64
    ports:
      - "8001:8000"
    environment:
      SHOW_MEMORY_UI: "true"
      SHOW_AUDIT_UI: "true"
      SHOW_JIRA_MODE_UI: "true"
      SHOW_PASTE_REQUIREMENTS_MODE_UI: "true"
      SHOW_AUTO_TESTS_UI: "true"

      JIRA_URL: ""
      JIRA_USERNAME: ""
      JIRA_PASSWORD: ""
      JIRA_TEST_PROJECT_KEY: ""
      JIRA_TEST_ISSUE_TYPE: Test
      JIRA_TEST_LINK_TYPE: Relates
      JIRA_LINK_INWARD_IS_REQUIREMENT: "true"
      JIRA_VERIFY_SSL: "false"
      JIRA_LINKED_WORK_ISSUE_TYPES: "Story,Improvement,Feature"
      JIRA_CREATEMETA_TEST_TTL_SECONDS: "3600"
      JIRA_TEST_SEVERITY_FIELD_ID: ""

      MOCK: "false"

      AUTOMATION_POST_ANALYSIS: "true"
      AUTOMATION_WRITE_RUN_HTML: "true"
      AUTOMATION_RETENTION_DAYS: "20"
      AUTOMATION_HEADLESS: "true"

      USE_KEYCLOAK: "false"
      KEYCLOAK_URL: ""
      KEYCLOAK_REALM: ""
      KEYCLOAK_CLIENT_ID: ""
      KEYCLOAK_CLIENT_SECRET: ""
      KEYCLOAK_IDLE_TIMEOUT_MINUTES: "300"
      KEYCLOAK_INTERNAL_URL: "http://host.docker.internal:8080"

      LLM_TEXT_URL: "http://host.docker.internal:1234/v1"
      LLM_TEXT_MODEL: "qwen/qwen3-coder-next"
      LLM_TEXT_ACCESS_TOKEN: ""
      DOCKER_LLM_URL: ""

      LLM_VISION_URL: "http://host.docker.internal:1234/v1"
      LLM_VISION_MODEL: "qwen/qwen3-vl-30b"
      LLM_VISION_ACCESS_TOKEN: ""

      LLM_REQUIREMENT_IMAGES_MAX_COUNT: "10"
      LLM_REQUIREMENT_IMAGES_MAX_TOTAL_MB: "200"

      AGENTIC_AUTO_EXTEND_PHASES: "1"
      AGENTIC_AUTO_EXTEND_ADDITIONAL_GENERATIONS: "3"
      AGENTIC_ROUND_CAP_CEILING: "10"

      MEMORY_SIMILARITY_THRESHOLD: "0.92"
      PASTE_MODE_PRIORITIES: "Highest, High, Medium, Low, Lowest"
      PASTE_MODE_SEVERITIES: "Blocker, Critical, Major, Minor, Trivial"

    volumes:
      - ./data:/app/data
    extra_hosts:
      - "host.docker.internal:host-gateway"
